name: Build macOS App

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and bundle
        run: chmod +x Scripts/bundle.sh && Scripts/bundle.sh

      # ── Signing & Notarization (version tags only) ──────────────────────────
      #
      # Required GitHub Actions secrets:
      #
      #   DEVELOPER_ID_CERTIFICATE_BASE64   base64 of your exported .p12 file
      #                                     openssl base64 -in cert.p12 | pbcopy
      #
      #   DEVELOPER_ID_CERTIFICATE_PASSWORD password set when exporting the .p12
      #
      #   DEVELOPER_ID_IDENTITY             full signing identity string, e.g.
      #                                     "Developer ID Application: Jane Doe (ABCDE12345)"
      #                                     (find it with: security find-identity -v -p codesigning)
      #
      #   NOTARYTOOL_API_KEY_ID             App Store Connect API key ID (10-char string)
      #
      #   NOTARYTOOL_API_ISSUER_ID          App Store Connect API issuer UUID
      #
      #   NOTARYTOOL_API_KEY_BASE64         base64 of the .p8 key file
      #                                     openssl base64 -in AuthKey_XXXX.p8 | pbcopy
      #
      # How to get these:
      #   Certificate: developer.apple.com → Certificates → + → Developer ID Application
      #   API key:     appstoreconnect.apple.com → Users & Access → Integrations →
      #                App Store Connect API → Generate API Key (role: Developer or Admin)
      #
      # No App Store app record or placeholder is needed — notarization is
      # entirely separate from App Store distribution.

      - name: Import Developer ID certificate
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Sign with Developer ID (hardened runtime)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: |
          codesign --force --deep \
            --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --timestamp \
            ".build/debug/MCP Manager.app"

          codesign --verify --deep --strict ".build/debug/MCP Manager.app"
          echo "Signing verified."

      - name: Notarize and staple
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          API_KEY_ID: ${{ secrets.NOTARYTOOL_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.NOTARYTOOL_API_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.NOTARYTOOL_API_KEY_BASE64 }}
        run: |
          # Write the .p8 key — notarytool expects the filename to match the key ID
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${API_KEY_ID}.p8"
          echo "$API_KEY_BASE64" | base64 --decode -o "$API_KEY_PATH"

          # Zip the app for submission (notarytool requires a zip or dmg)
          cd .build/debug
          zip -r -y "MCP-Manager-submit.zip" "MCP Manager.app"
          cd ../..

          # Submit and wait — exits non-zero if Apple rejects it
          xcrun notarytool submit ".build/debug/MCP-Manager-submit.zip" \
            --key "$API_KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait

          # Staple the ticket so the app passes Gatekeeper offline
          xcrun stapler staple ".build/debug/MCP Manager.app"
          xcrun stapler validate ".build/debug/MCP Manager.app"
          echo "Notarization and stapling complete."

      - name: Clean up keychain
        if: always() && startsWith(github.ref, 'refs/tags/v')
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true

      # ── Packaging & Release ─────────────────────────────────────────────────

      - name: Zip app bundle
        run: |
          cd .build/debug
          zip -r -y "MCP-Manager.zip" "MCP Manager.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCP-Manager
          path: .build/debug/MCP-Manager.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: .build/debug/MCP-Manager.zip
          generate_release_notes: true
