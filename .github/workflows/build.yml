name: Build macOS App

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and bundle
        run: chmod +x Scripts/bundle.sh && Scripts/bundle.sh

      # ── Signing & Notarization (version tags only) ──────────────────────────
      # Uses the same secrets as project_dash-2:
      #   BUILD_CERTIFICATE_BASE64      base64-encoded Developer ID Application .p12
      #   BUILD_CERTIFICATE_PASSWORD    .p12 export password
      #   ASC_API_KEY_B64               base64-encoded .p8 App Store Connect API key
      #   ASC_KEY_ID                    App Store Connect API key ID
      #   ASC_ISSUER_ID                 App Store Connect issuer UUID
      #
      # Note: BUILD_CERTIFICATE_BASE64 must be a Developer ID Application cert
      # (for direct/notarized distribution), not an App Store distribution cert.
      # Export it from Keychain Access → right-click → Export as .p12.
      # The ASC keys (ASC_API_KEY_B64, ASC_KEY_ID, ASC_ISSUER_ID) are the same
      # values used in project_dash-2 — copy them across.

      - name: Install Developer ID certificate
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.BUILD_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}-signing
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db"

      - name: Install App Store Connect API key
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.ASC_API_KEY_B64 }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Sign with Developer ID (hardened runtime)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning \
            "$RUNNER_TEMP/app-signing.keychain-db" \
            | grep "Developer ID Application" | head -1 | awk -F '"' '{print $2}')

          echo "Signing with: $SIGNING_IDENTITY"

          codesign --force --deep \
            --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --timestamp \
            ".build/debug/MCP Manager.app"

          codesign --verify --deep --strict ".build/debug/MCP Manager.app"
          echo "Signing verified."

      - name: Notarize and staple
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd .build/debug
          zip -r -y "MCP-Manager-submit.zip" "MCP Manager.app"
          cd ../..

          xcrun notarytool submit ".build/debug/MCP-Manager-submit.zip" \
            --key ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            --key-id ${{ secrets.ASC_KEY_ID }} \
            --issuer ${{ secrets.ASC_ISSUER_ID }} \
            --wait

          xcrun stapler staple ".build/debug/MCP Manager.app"
          xcrun stapler validate ".build/debug/MCP Manager.app"
          echo "Notarized and stapled."

      - name: Clean up keychain
        if: always() && startsWith(github.ref, 'refs/tags/v')
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true

      # ── Package & Release ───────────────────────────────────────────────────

      - name: Zip app bundle
        run: |
          cd .build/debug
          zip -r -y "MCP-Manager.zip" "MCP Manager.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCP-Manager
          path: .build/debug/MCP-Manager.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: .build/debug/MCP-Manager.zip
          generate_release_notes: true
